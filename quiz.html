<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Story — 二人の診断</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/site.css">
<style>
  .quiz-section{
    min-height:80svh;
    padding:8vh 6vw 12vh;
    max-width:560px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .quiz-progress{
    display:flex;
    gap:8px;
    margin:2em 0 3em;
  }
  .quiz-dot{
    width:8px; height:8px;
    border-radius:50%;
    background:var(--line);
    transition:background 0.3s ease, transform 0.3s ease;
  }
  .quiz-dot.is-done{ background:var(--gold); }
  .quiz-dot.is-current{ background:var(--gold-soft); transform:scale(1.3); }

  .quiz-card{ width:100%; }

  .quiz-question{
    font-family:var(--font-jp-serif);
    font-weight:600;
    font-size:clamp(1.25rem, 4.5vw, 1.6rem);
    margin:0 0 1.6em;
    line-height:1.7;
  }

  .quiz-options{
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .quiz-option{
    text-align:left;
    font-family:var(--font-jp-sans);
    font-size:0.96rem;
    color:var(--text);
    background:var(--ink-soft);
    border:1px solid var(--line);
    padding:16px 20px;
    border-radius:4px;
    cursor:pointer;
    transition:border-color 0.2s ease, transform 0.15s ease, background 0.2s ease;
  }
  .quiz-option:hover{ border-color:var(--gold); }
  .quiz-option:active{ transform:scale(0.98); background:var(--ink-alt); }

  /* ---- 結果カード ---- */
  .result-emoji{ font-size:2.6rem; }
  .result-title{
    font-family:var(--font-jp-serif);
    font-weight:700;
    font-size:clamp(1.5rem, 5vw, 2rem);
    margin:0.5em 0 0.2em;
    color:var(--gold-soft);
  }
  .result-desc{
    color:var(--text-dim);
    font-size:0.96rem;
    line-height:2;
    margin-top:1.2em;
  }
  .result-actions{
    margin-top:2.6em;
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .btn-ghost{
    font-family:var(--font-en);
    font-style:italic;
    color:var(--text-dim);
    background:none;
    border:1px solid var(--line);
    padding:11px 24px;
    border-radius:2px;
    cursor:pointer;
    transition:color 0.2s ease, border-color 0.2s ease;
  }
  .btn-ghost:hover{ color:var(--gold-soft); border-color:var(--gold); }

  .fade-swap{ animation:fade-swap 0.45s ease; }
  @keyframes fade-swap{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
  }
  @media (prefers-reduced-motion: reduce){ .fade-swap{ animation:none; } }
</style>
</head>
<body>

<div class="grain"></div>
<div class="petals" id="petals" aria-hidden="true"></div>

<nav class="site-nav">
  <a href="story.html" data-nav>Story</a>
  <a href="calendar.html" data-nav>Calendar</a>
  <a href="quiz.html" data-nav class="is-active">Quiz</a>
  <a href="index.html" class="lock-link">🔒 ロック画面へ</a>
</nav>

<section class="quiz-section">
  <p class="eyebrow reveal">Diagnosis</p>
  <h2 class="section-title reveal">二人のタイプ診断</h2>

  <div class="quiz-progress" id="quiz-progress"></div>

  <div class="quiz-card" id="quiz-card"></div>
</section>

<script src="assets/auth.js"></script>
<script src="assets/quiz-data.js"></script>
<script src="assets/effects.js"></script>
<script>
  protectPage();
  wireNavLinks();

  const progressEl = document.getElementById('quiz-progress');
  const cardEl = document.getElementById('quiz-card');

  let currentIndex = 0;
  const scores = {};
  Object.keys(RESULT_TYPES).forEach(k => scores[k] = 0);

  function renderProgress(){
    progressEl.innerHTML = '';
    for (let i = 0; i < QUESTIONS.length; i++){
      const dot = document.createElement('span');
      dot.className = 'quiz-dot' + (i < currentIndex ? ' is-done' : (i === currentIndex ? ' is-current' : ''));
      progressEl.appendChild(dot);
    }
  }

  function renderQuestion(){
    renderProgress();
    const q = QUESTIONS[currentIndex];

    const optionsHtml = q.options.map(opt => `
      <button class="quiz-option" data-type="${opt.type}">${opt.label}</button>
    `).join('');

    cardEl.innerHTML = `
      <div class="fade-swap">
        <p class="quiz-question">${q.text}</p>
        <div class="quiz-options">${optionsHtml}</div>
      </div>
    `;

    cardEl.querySelectorAll('.quiz-option').forEach(btn => {
      btn.addEventListener('click', () => {
        scores[btn.dataset.type]++;
        currentIndex++;
        if (currentIndex < QUESTIONS.length){
          renderQuestion();
        } else {
          renderResult();
        }
      });
    });
  }

  function topType(){
    let best = null;
    let bestScore = -1;
    Object.keys(scores).forEach(key => {
      if (scores[key] > bestScore){
        bestScore = scores[key];
        best = key;
      }
    });
    return best;
  }

  function renderResult(){
    progressEl.innerHTML = '';
    const key = topType();
    const result = RESULT_TYPES[key];

    cardEl.innerHTML = `
      <div class="fade-swap">
        <p class="result-emoji">${result.emoji}</p>
        <h3 class="result-title">${result.title}</h3>
        <p class="result-desc">${result.desc}</p>
        <div class="result-actions">
          <button class="btn" id="quiz-retry">もう一度診断する</button>
        </div>
      </div>
    `;

    document.getElementById('quiz-retry').addEventListener('click', () => {
      currentIndex = 0;
      Object.keys(scores).forEach(k => scores[k] = 0);
      renderQuestion();
    });
  }

  renderQuestion();
</script>
</body>
</html>
